name: Build & Release Multi-Platform

on:
  push:
    tags:
      - 'v*'
  release:
    types: [created]

# 全局权限设置
permissions:
  contents: write
  packages: write
  actions: read # 需要读取 artifacts

jobs:
  # ================= 1. 构建阶段 (并行运行) =================

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Deps
        run: npm ci
      - name: Build
        run: |
          npm run build
          npx electron-builder --win --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: |
            dist/*-setup.exe
            dist/*-setup.exe.blockmap
            dist/latest.yml
          retention-days: 1 # 只需保留很短时间，发布完即自动清理

  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Deps
        run: npm ci
      - name: Build
        run: |
          npm run build
          npx electron-builder --linux --x64 --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-x64
          path: |
            dist/*.deb
            dist/*.AppImage
            dist/latest-linux.yml
          retention-days: 1

  build-linux-arm64:
    # 尝试使用原生 ARM runner，如果不可用请切换回 ubuntu-latest + QEMU
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Deps
        run: npm ci
      - name: Build
        run: |
          npm run build
          npx electron-builder --linux --arm64 --publish never
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-arm64
          path: |
            dist/*.deb
            dist/*.AppImage
          retention-days: 1

  # ================= 2. 发布阶段 (串行，依赖所有构建完成) =================

  publish-release:
    needs: [build-windows, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 下载所有构建产物
      - name: Download Windows Assets
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist-win

      - name: Download Linux x64 Assets
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-x64
          path: dist-linux-x64

      - name: Download Linux ARM64 Assets
        uses: actions/download-artifact@v4
        with:
          name: dist-linux-arm64
          path: dist-linux-arm64

      # 合并文件到一个目录，方便 action-gh-release 处理
      - name: Merge Assets
        run: |
          mkdir -p dist-final
          cp dist-win/* dist-final/
          cp dist-linux-x64/* dist-final/
          cp dist-linux-arm64/* dist-final/

          # 可选：打印文件列表确认
          ls -R dist-final/

      # 统一上传并发布
# --- 获取 Commit 信息 (核心修改) ---
      - name: Get Commit Info
        id: commit_info
        run: |
          COMMIT_SHORT_SHA=$(git rev-parse --short HEAD)
          COMMIT_SUBJECT=$(git log -1 --pretty=format:"%s")

          echo "short_sha=$COMMIT_SHORT_SHA" >> $GITHUB_OUTPUT
          echo "subject=$COMMIT_SUBJECT" >> $GITHUB_OUTPUT
          echo "🏷️ Tag: ${{ github.ref_name }}"
          echo "💬 Commit: $COMMIT_SUBJECT ($COMMIT_SHORT_SHA)"

      # --- 生成专业的 Release Body ---
      - name: Generate Release Body
        id: changelog
        run: |
          cat << EOF > body.md
          ## 🚀 版本发布：${{ github.ref_name }}

          **更新内容**: ${{ steps.commit_info.outputs.subject }}
          **构建时间**: $(date -u +"%Y-%m-%d %H:%M UTC")

          ---
          ### 📦 下载列表

          | 平台 | 架构 | 推荐文件 | 说明 |
          | :--- | :--- | :--- | :--- |
          | **Windows** | x64 | \`win/*-setup.exe\` | 一键安装程序 |
          | **Linux** | x64 | \`linux-x64/*-x64.AppImage\` | 通用免安装 (推荐) |
          | **Linux** | x64 | \`linux-x64/*.deb\` | Debian/Ubuntu 安装包 |
          | **Linux** | ARM64 | \`linux-arm64/*-arm64.AppImage\` | 树莓派/华为/Oracle Pi |
          | **Linux** | ARM64 | \`linux-arm64/*-arm64.deb\` | ARM 架构 Deb 包 |

          > 💡 **提示**:
          > - Windows 用户直接运行 \`setup.exe\`。
          > - Linux 用户优先选择 \`AppImage\`，无需安装，赋予执行权限后双击即可运行。
          > - 如果不确定架构，请在终端运行 \`uname -m\` (x86_64 为 x64, aarch64 为 ARM64)。
          EOF

          echo "body<<EOFMARKER" >> $GITHUB_OUTPUT
          cat body.md >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT

      # --- 统一上传并发布 ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # ✅ 关键：使用 Git Tag (如 v1.1.0) 而不是 Hash
          tag_name: ${{ github.ref_name }}

          # ✅ 标题格式：提交标题 (版本号)
          name: "Release ${{ github.ref_name }}"

          # ✅ 使用生成的详细正文
          body: ${{ steps.changelog.outputs.body }}

          generate_release_notes: true # 自动追加 GitHub 的变更日志
          draft: false
          prerelease: false

          # 上传所有整理好的文件 (包含子目录结构)
          files: |
            dist-final/**/*
